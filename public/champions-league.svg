<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffb700"/>
    </linearGradient>
  </defs>

  <rect width="600" height="250" fill="url(#bgGrad)"/>

  <!-- Stars decoration -->
  <circle cx="50" cy="40" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="550" cy="50" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="100" cy="200" r="2" fill="#ffd700" opacity="0.4"/>
  <circle cx="500" cy="190" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="150" cy="80" r="2" fill="#ffd700" opacity="0.3"/>
  <circle cx="450" cy="70" r="2" fill="#ffd700" opacity="0.5"/>

  <!-- Trophy icon -->
  <g transform="translate(260, 60)">
    <path d="M40 0 L50 0 L55 40 L35 40 Z" fill="url(#goldGrad)"/>
    <ellipse cx="45" cy="0" rx="20" ry="8" fill="url(#goldGrad)"/>
    <rect x="38" y="40" width="14" height="20" fill="url(#goldGrad)"/>
    <ellipse cx="45" cy="60" rx="25" ry="8" fill="url(#goldGrad)"/>
    <!-- Handles -->
    <path d="M25 10 Q5 10 5 30 Q5 45 25 45" stroke="url(#goldGrad)" stroke-width="4" fill="none"/>
    <path d="M65 10 Q85 10 85 30 Q85 45 65 45" stroke="url(#goldGrad)" stroke-width="4" fill="none"/>
  </g>

  <!-- Main text -->
  <text x="300" y="170" text-anchor="middle" fill="url(#goldGrad)" font-family="Arial, sans-serif" font-size="36" font-weight="bold">CHAMPIONS LEAGUE</text>
  <text x="300" y="200" text-anchor="middle" fill="#a0c4ff" font-family="Arial, sans-serif" font-size="16">Football Teams Generator</text>

  <!-- Decorative lines -->
  <line x1="100" y1="220" x2="250" y2="220" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  <line x1="350" y1="220" x2="500" y2="220" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  <circle cx="300" cy="220" r="4" fill="#ffd700"/>
</svg>
